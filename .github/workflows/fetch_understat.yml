- name: Fetch historical Understat data
        run: |
          cd scripts
          # Run the script and capture output to a log file
          python fetch_historical_understat.py --seasons ${{ inputs.seasons }} --delay ${{ inputs.delay }} --data-dir ../data/raw/understat 2>&1 | tee ../../understat_fetch.log
        env:
          # Set environment variables if needed
          SOCCERDATA_DIR: ${{ github.workspace }}