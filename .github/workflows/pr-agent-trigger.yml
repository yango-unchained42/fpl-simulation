name: PR Agent Trigger

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  trigger-review:
    if: >-
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review' && github.event.review.user.login == github.repository_owner) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, 'gandalf'))
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.action.outputs.action }}
      pr_number: ${{ steps.action.outputs.pr_number }}
      branch: ${{ steps.action.outputs.branch }}
      title: ${{ steps.action.outputs.title }}
    steps:
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "action=review" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "action=fix" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "action=review" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "branch=" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          fi

      - name: Send webhook to Hermes
        env:
          HERMES_WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK_URL }}
          HERMES_WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
        if: env.HERMES_WEBHOOK_URL != ''
        run: |
          PAYLOAD=$(jq -n \
            --arg action "${{ steps.action.outputs.action }}" \
            --arg pr_number "${{ steps.action.outputs.pr_number }}" \
            --arg branch "${{ steps.action.outputs.branch }}" \
            --arg title "${{ steps.action.outputs.title }}" \
            --arg repo "${{ github.repository }}" \
            --arg event_name "${{ github.event_name }}" \
            --arg sender "${{ github.actor }}" \
            '{action: $action, pr_number: $pr_number, branch: $branch, title: $title, repo: $repo, event_name: $event_name, sender: $sender}')

          # Compute HMAC signature if secret is set
          if [ -n "$HERMES_WEBHOOK_SECRET" ]; then
            SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$HERMES_WEBHOOK_SECRET" | sed 's/.*= //')
            curl -sf -X POST "$HERMES_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
              -d "$PAYLOAD"
          else
            curl -sf -X POST "$HERMES_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi

  review-pr:
    needs: trigger-review
    if: needs.trigger-review.outputs.action == 'review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run Gandalf Review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ needs.trigger-review.outputs.pr_number }}"
          echo "=== Gandalf Auto-Review for PR #$PR_NUM ==="

          # Fetch PR details
          PR_JSON=$(gh pr view "$PR_NUM" --json title,body,headRefName,baseRefName,files)
          TITLE=$(echo "$PR_JSON" | jq -r '.title')
          BRANCH=$(echo "$PR_JSON" | jq -r '.headRefName')
          FILES=$(echo "$PR_JSON" | jq -r '.files[].path')

          echo "PR: $TITLE"
          echo "Branch: $BRANCH"
          echo "Files changed:"
          echo "$FILES"

          # Checkout PR branch
          git checkout "$BRANCH"

          # Run automated checks
          echo ""
          echo "=== Running ruff ==="
          pip install ruff 2>/dev/null
          ruff check src/ scripts/ || true

          echo ""
          echo "=== Running pytest ==="
          pip install -e ".[dev]" 2>/dev/null || pip install pytest 2>/dev/null
          pytest tests/ -x -q 2>&1 | tail -20 || true

          echo ""
          echo "=== Checking for hardcoded secrets ==="
          grep -rn "SUPABASE_ACCESS_TOKEN\|password\|api_key\|secret" src/ scripts/ --include="*.py" | grep -v "os.getenv\|config\.\|import\|#.*TODO" || echo "No hardcoded secrets found"

          echo ""
          echo "=== Checking for hardcoded seasons ==="
          grep -rn '"20[0-9][0-9]-[0-9][0-9]"' src/ scripts/ --include="*.py" | grep -v "test_\|config\.\|#" || echo "No hardcoded seasons found"

          echo ""
          echo "=== Automated review complete ==="
